<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Currency banknote illustration</title>
  <desc id="desc">Layered banknotes and coins for currency trivia questions.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#103d34"/>
      <stop offset="100%" stop-color="#2c8f7a"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d7fff1"/>
      <stop offset="100%" stop-color="#83d7b6"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect x="118" y="84" width="304" height="176" rx="22" transform="rotate(-8 270 172)" fill="#0c5b4d" opacity="0.55"/>
  <rect x="178" y="64" width="304" height="176" rx="22" transform="rotate(6 330 152)" fill="url(#note)"/>
  <rect x="154" y="102" width="332" height="176" rx="22" fill="#bff4d6"/>
  <rect x="184" y="132" width="272" height="116" rx="18" fill="#8fd0b3"/>
  <circle cx="320" cy="190" r="50" fill="#f1fff6"/>
  <circle cx="320" cy="190" r="28" fill="#7cc8a6"/>
  <g fill="#0c5b4d" font-family="Verdana, Geneva, sans-serif" font-weight="700">
    <text x="212" y="164" font-size="28">100</text>
    <text x="372" y="164" font-size="28">100</text>
    <text x="298" y="201" font-size="34">$</text>
  </g>
  <circle cx="494" cy="244" r="52" fill="#ffd166"/>
  <circle cx="494" cy="244" r="40" fill="#ffbd59"/>
  <text x="478" y="255" fill="#8f5d00" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700">$</text>
</svg>
